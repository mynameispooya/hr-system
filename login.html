<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | سیستم مدیریت منابع انسانی</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                </div>
                <h1>سیستم مدیریت منابع انسانی</h1>
                <p class="login-subtitle">برای ورود، اطلاعات خود را وارد کنید</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">نام کاربری</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="نام کاربری خود را وارد کنید"
                        required
                        autocomplete="username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">رمز عبور</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="رمز عبور خود را وارد کنید"
                        required
                        autocomplete="current-password"
                    >
                </div>

                <button type="submit" class="btn btn-primary btn-block login-btn">
                    <span class="btn-text">ورود به سیستم</span>
                    <span class="btn-loader" style="display: none;">
                        <div class="spinner-small"></div>
                    </span>
                </button>
            </form>

            <div class="login-footer">
                <p>نسخه ۱.۰.۰ | توسعه یافته با ❤️</p>
            </div>
        </div>

        <div class="login-background">
            <div class="bg-shape bg-shape-1"></div>
            <div class="bg-shape bg-shape-2"></div>
            <div class="bg-shape bg-shape-3"></div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
